frr version 8.4_git
frr defaults traditional
hostname frr
log stdout
ip forwarding
no ipv6 forwarding
!
interface eth0
 ip address 172.16.252.22/24
!
interface eth1
 ip address 172.16.0.1/30
!
interface eth2
 ip address 172.16.253.1/24
!
interface eth3
 ip address 172.16.254.1/24
!
router ospf
 ospf router-id 1.1.1.1
 network 172.16.0.0/30 area 0
 default-information originate always
!
ip route 0.0.0.0/0 172.16.252.1
!
line vty
!
